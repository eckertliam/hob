name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-rust:
    name: Build Rust agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --manifest-path agent/Cargo.toml
      - name: Test
        run: cargo test --manifest-path agent/Cargo.toml

  lint-elisp:
    name: Byte-compile Elisp
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        with:
          version: '29.4'
      - name: Byte-compile
        run: emacs --batch -L lisp/ -f batch-byte-compile lisp/*.el
